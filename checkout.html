        <a href="member.html"><img class="b" src="img/icon/member.png" align="right"/></a>
        <div class="search">
            <input type="text" id="navSearchInput" placeholder="搜尋商品...">

            <ul id="orderList"></ul>
            <p class="order-total">

        <section class="checkout-form">
            <h3>訂購人資料</h3>
            <label>姓名<input type="text" id="name" required></label>
            <label>電話<input type="tel" id="phone" required></label>

            <div class="footer-col">
                <img src="img/logo.png" alt="logo" class="footer-logo">

                    <a href="mailto:tracy20051208@gmail.com"><img src="img/icon/envelope.png"></a>
                </div>

    <script src="checkout.js"></script>
    <script>
        function handleNavSearch() {
        const searchInput = document.getElementById("navSearchInput");
        if (!searchInput) return;

        const keyword = searchInput.value.trim();

        if (keyword === "") {
            alert("請輸入搜尋關鍵字喔！");
            return;
        }
        localStorage.setItem("searchKeyword", keyword);
        window.location.href = "products.html";
        }
    </script>
