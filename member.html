        <a href="index.html"><img class="a" src="img/logo.png" align="left" /></a>

        <a href="member.html"><img class="b" src="img/icon/member.png" align="right"/></a>

            <input type="text" id="navSearchInput" placeholder="搜尋商品...">

        <nav>
            <a href="products.html">全部商品</a>

    <div class="login-wrapper">
        <div class="login-card">
            <h2 class="brand-title">會員登入/註冊</h2>
            <p class="brand-subtitle">Time to Bloom</p>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">帳號</label>
                    <input type="text" id="username" placeholder="請輸入帳號">
                </div>
            
                <div class="form-group">
                    <label for="password">密碼</label>
                    <input type="password" id="password" placeholder="請輸入密碼">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn">登入</button>
                    <button type="button" id="registerBtn" class="btn">註冊</button>
                </div>            
            </form>
        </div>
    </div>
  
    <div id="userInfo" class="form-box hidden">
      <h3>會員資訊</h3>
      <p>Hi，<span id="userName"></span></p>
      <button id="logoutBtn" class="btn">登出</button>
      <h3 style="margin-top:20px;">購買記錄</h3>
      <table id="purchaseHistoryTable" class="history-table">
        <thead>
          <tr>
            <th>日期</th>
            <th>商品</th>
            <th>數量</th>
            <th>小計</th>
            <th>收件人</th>
            <th>電話</th>
            <th>地址</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="purchaseHistory"></tbody>
      </table>
      <h3 style="margin-top:30px;">我的評論</h3>
      <ul id="myReviews" class="review-list"></ul>
      <h3 style="margin-top:30px;">編輯會員資料</h3>
      <form id="editForm">
        <div class="form-group">
          <label for="email">信箱</label>
          <input type="email" id="email" placeholder="更新信箱">
        </div>
        <div class="form-group">
          <label for="newPassword">新密碼</label>
          <input type="password" id="newPassword" placeholder="輸入新密碼">
        </div>
        <div class="form-actions">
          <button type="submit" class="btn">更新資料</button>
        </div>
      </form>
    </div>

  </section>
    <footer class="footer footer-advanced">

                    <a href="mailto:tracy20051208@gmail.com"><img src="img/icon/envelope.png"></a>
                </div>
            </div>
            <div class="footer-col">

        </div>
        <div class="footer-bottom">© 2026 花時間花店 All Rights Reserved.</div>
    </footer>
    <script src="login.js"></script>
    <script>
        function handleNavSearch() {
        const searchInput = document.getElementById("navSearchInput");
        if (!searchInput) return;

        const keyword = searchInput.value.trim();

        if (keyword === "") {
            alert("請輸入搜尋關鍵字喔！");
            return;
        }
        localStorage.setItem("searchKeyword", keyword);
        window.location.href = "products.html";
        }
    </script>
</body>
